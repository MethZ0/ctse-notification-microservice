name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ctse-notification-service

jobs:
  build-and-push:
    name: Build & Push Docker Image to ACR
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Log in to Azure Container Registry ──────────────────────────────
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # ─── 3. Build and push Docker image to ACR ──────────────────────────────
      #        Pushes two tags: 'latest' (for ACR webhook trigger) and git SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deployment summary
        run: |
          echo "✅ Image pushed to ACR successfully!"
          echo "Image: ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest"
          echo "Azure Container Apps will auto-deploy via ACR webhook."

