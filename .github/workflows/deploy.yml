name: Deploy Notification Service to Azure

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ctse-notification-service

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Log in to Azure Container Registry ──────────────────────────────
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # ─── 3. Build and push Docker image to ACR ──────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ─── 4. Log in to Azure (requires AZURE_CREDENTIALS service principal) ──
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─── 5. Deploy new image to Azure Container Apps ────────────────────────
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              PORT=8004 \
              MONGODB_URI=secretref:mongodb-uri \
              MONGODB_DATABASE=notification-db \
              JWT_SECRET=secretref:jwt-secret \
              MAIL_USERNAME=secretref:mail-username \
              MAIL_PASSWORD=secretref:mail-password \
              EMAIL_ENABLED=true

      # ─── 6. Verify deployment ────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "Image: ${{ secrets.AZURE_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
