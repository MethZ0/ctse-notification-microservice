name: Trigger auto deployment for ctse-notification-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ctse-notification-service-AutoDeployTrigger-c6225dfd-2fbe-414b-a478-bc302e328127.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven (compile before SonarCloud scan)
        run: mvn -B package -DskipTests

        # Step 2: SonarCloud Scan
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CTSENOTIFICATIONSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CTSENOTIFICATIONSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CTSENOTIFICATIONSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: ctseregistry.azurecr.io
          registryUsername: ${{ secrets.CTSENOTIFICATIONSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CTSENOTIFICATIONSERVICE_REGISTRY_PASSWORD }}
          containerAppName: ctse-notification-service
          resourceGroup: ctse-rg
          imageToBuild: ctseregistry.azurecr.io/ctse-notification-service:${{ github.sha }}
          ingress: external
          targetPort: 8004

      # Fix target port explicitly after deploy (safety net)
      - name: Fix ingress target port to 8004
        run: |
          az containerapp ingress update \
            --name ctse-notification-service \
            --resource-group ctse-rg \
            --target-port 8004




